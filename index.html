<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寫實棚拍 榮耀配置圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/@imgly/background-removal.js"></script>

    <style>
        :root {
            /* 寫實深色棚拍底色 */
            --bg-dark: #0f1115;
            --panel-bg: #14161a; 
            
            /* 預設金屬色 (會隨名次切換) */
            --metal-primary: #d4af37;
            --spotlight-color: rgba(212, 175, 55, 0.15);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Helvetica Neue', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
            height: 100vh;
            box-sizing: border-box;
        }

        /* 🎛️ 左側控制面板 (專業後台感) */
        .controls {
            flex: 1; background: var(--bg-dark); padding: 20px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 15px; max-width: 350px; overflow-y: auto; 
            border: 1px solid #2a2d35; 
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; letter-spacing: 2px;}
        .controls label { font-weight: bold; font-size: 14px; color: #aaa; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #1a1c23; border: 1px solid #333; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #2a2d35; border-radius: 6px; padding: 15px; background: #111318; margin-bottom: 10px; border-left: 4px solid var(--metal-primary); transition: all 0.3s ease;}
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 5px;}
        
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #0a0b0d; padding: 10px; border-radius: 4px; border: 1px solid #222; display: flex; flex-direction: column; gap: 6px;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 0; color: #777;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; color: #888;}
        .parts-grid-inputs input[type="text"] { width: 100%; font-size: 12px; padding: 6px; background: #14161a; border: 1px solid #333; margin:0; border-radius: 3px; color: #fff;}

        button { background: #fff; color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s;}
        button:hover { background: var(--metal-primary); color: #000; }

        /* 📸 右側預覽畫布 */
        .preview-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding-bottom: 50px;}
        #export-canvas { display: flex; gap: 20px; background-color: #050505; padding: 20px; transition: all 0.5s ease; width: 1100px; height: 1350px;}

        /* 🎬 寫實棚拍面板 */
        .studio-panel {
            background-color: var(--panel-bg);
            position: relative;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden; 
            height: 100%;
            /* 模擬一點真實相機的暗角效果 */
            background-image: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.7) 100%);
        }

        /* 攝影棚頂部聚光燈 (Spotlight) */
        .spotlight {
            position: absolute; top: -10%; left: 50%; transform: translateX(-50%);
            width: 150%; height: 100%;
            background: radial-gradient(ellipse at top, var(--spotlight-color) 0%, transparent 60%);
            z-index: 0; pointer-events: none; transition: background 0.5s ease;
        }

        /* 實體金屬文字質感 */
        .metal-text {
            color: var(--metal-primary);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2), -1px -1px 2px rgba(0,0,0,0.8);
            font-weight: 900;
        }

        /* 🖼️ 左半部：人物海報區 */
        .poster-section { width: 500px; padding: 40px 20px; box-sizing: border-box; }
        .content-wrapper { position: relative; z-index: 5; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center;}
        
        /* 乾淨現代的標題 */
        .top-name { 
            position: relative; z-index: 10;
            font-size: 32px; letter-spacing: 8px; color: #fff; text-transform: uppercase;
            border-bottom: 1px solid #444; padding-bottom: 15px; width: 85%; text-align: center; 
        }

        /* 人像區域 (真實柔和投影) */
        .player-img-container { 
            position: absolute; top: 100px; bottom: 350px; left: 0; width: 100%; 
            display: flex; justify-content: center; align-items: center; z-index: 2; 
        }
        .player-img-container img { 
            max-width: 150%; max-height: 100%; object-fit: contain; object-position: center;
            /* 模擬真實攝影棚背景牆投影 */
            filter: drop-shadow(0 30px 30px rgba(0,0,0,0.9)); 
        }

        /* 底部漸層 (讓文字好讀) */
        .bottom-gradient-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 450px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 5%, rgba(0,0,0,0) 100%);
            z-index: 3; pointer-events: none;
        }

        .bottom-info-box {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        .rank-title-box { text-align: center; margin-bottom: 30px; }
        .rank-title-box h3 { font-size: 18px; color: #999; margin: 0 0 10px 0; letter-spacing: 6px; text-transform: uppercase;}
        .rank-title-box h1 { font-size: 65px; margin: 0; letter-spacing: 12px; }

        .logo-slot { width: 100%; height: 120px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px;}
        .logo-slot img { max-width: 85%; max-height: 85%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); }

        /* ⚙️ 右半部：零件配置陳列區 */
        .parts-section { width: 560px; padding: 40px 20px 50px 20px; box-sizing: border-box; display: flex; flex-direction: column;} 
        .parts-title { font-size: 26px; color: #fff; letter-spacing: 6px; margin-bottom: 20px; text-align: center; font-weight: normal;}

        #showcase-box {
            flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; width: 100%;
        }

        /* 🟦 黑化霧面玻璃材質 (Glassmorphism) */
        .config-block { 
            width: 95%; display: flex; flex-direction: column; align-items: center; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 0; border-radius: 8px;
            border-top: 1px solid var(--glass-border);
            border-left: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        } 
        
        /* 乾淨的配置標題 */
        .config-header { font-size: 16px; color: #aaa; margin-bottom: 20px; letter-spacing: 3px; position: relative; font-weight: normal; text-transform: uppercase;}
        .config-header::before, .config-header::after { content: ''; position: absolute; top: 50%; width: 50px; height: 1px; background: #444; }
        .config-header::before { right: 100%; margin-right: 15px; }
        .config-header::after { left: 100%; margin-left: 15px; }

        .parts-grid-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; transition: all 0.3s ease; }

        .part-item { width: 90px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: all 0.3s ease; }
        .part-item img { width: 100%; height: 90px; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.6)); transition: all 0.3s ease; }
        .part-name-text { font-size: 13px; color: #ccc; text-align: center; width: 100%; word-break: break-all; font-family: 'Helvetica Neue', sans-serif; letter-spacing: 1px;}

        /* 智能放大模式 */
        .parts-grid-display.large-mode { gap: 30px; }
        .parts-grid-display.large-mode .part-item { width: 130px; }
        .parts-grid-display.large-mode .part-item img { height: 130px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.7)); }
        .parts-grid-display.large-mode .part-name-text { font-size: 15px; color: #fff;}

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 100; color: #fff; font-size: 20px; font-weight: bold; letter-spacing: 2px;}

        /* 🏆 動態金屬色彩設定 (寫實版) */
        #export-canvas.theme-gold {
            --metal-primary: #d4af37; --spotlight-color: rgba(212, 175, 55, 0.15);
        }
        #export-canvas.theme-silver {
            --metal-primary: #e2e8f0; --spotlight-color: rgba(255, 255, 255, 0.1);
        }
        #export-canvas.theme-bronze {
            --metal-primary: #cd7f32; --spotlight-color: rgba(205, 127, 50, 0.15);
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-overlay">處理中...</div>

    <div class="controls">
        <h2>賽事配置主機</h2>
        <label>選手姓名:</label>
        <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')">
        
        <label>名次配置 (自動切換金屬色系):</label>
        <select id="input-rank" onchange="updateRank()">
            <option value="gold">🏆 冠軍</option>
            <option value="silver">🥈 亞軍</option>
            <option value="bronze">🥉 季軍</option>
        </select>

        <div class="file-upload-wrapper">
            <h4>👤 選手人像照片</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'player-img', true)">
        </div>

        <div class="file-upload-wrapper">
            <h4>✨ 專屬賽事 LOGO</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'custom-logo-img')">
        </div>

        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 匯出寫實棚拍海報</button>
    </div>

    <div class="preview-container">
        <div id="export-canvas" class="theme-gold">
            
            <div class="studio-panel poster-section" id="poster-panel">
                <div class="spotlight"></div>
                
                <div class="content-wrapper">
                    <div class="top-name" id="display-name-top">郭嘉弘</div>
                    
                    <div class="player-img-container">
                        <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                    </div>

                    <div class="bottom-gradient-overlay"></div>

                    <div class="bottom-info-box">
                        <div class="rank-title-box">
                            <h3>Tournament Winner</h3>
                            <h1 class="metal-text" id="display-rank">冠軍</h1>
                        </div>
                        <div class="logo-slot">
                            <img id="custom-logo-img" src="" alt="" style="display: none;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="studio-panel parts-section">
                <div class="spotlight" style="opacity: 0.5;"></div>

                <div class="content-wrapper" style="width: 100%;">
                    <div class="parts-title">陀螺配置</div>
                    <div id="showcase-box">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 戰術配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>部件 1</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 1)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 1, this.value)"></div>
                        <div><label>部件 2</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 2)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 2, this.value)"></div>
                        <div><label>部件 3</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 3)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 3, this.value)"></div>
                        <div><label>部件 4</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 4)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 4, this.value)"></div>
                        <div><label>部件 5</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 5)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 5, this.value)"></div>
                        <div><label>部件 6</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 6)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 6, this.value)"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                // 改用黑化玻璃感區塊
                const showcaseHtml = `
                <div class="config-block">
                    <div class="config-header" id="header-c${i}">CONFIG 0${i}</div>
                    <div class="parts-grid-display" id="grid-c${i}">
                        <div class="part-item" id="slot-c${i}-p1"><img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p1"></div></div>
                        <div class="part-item" id="slot-c${i}-p2"><img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p2"></div></div>
                        <div class="part-item" id="slot-c${i}-p3"><img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p3"></div></div>
                        <div class="part-item" id="slot-c${i}-p4"><img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p4"></div></div>
                        <div class="part-item" id="slot-c${i}-p5"><img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p5"></div></div>
                        <div class="part-item" id="slot-c${i}-p6"><img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p6"></div></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        initConfigurations();

        function updateText(type) {
            if(type === 'name') document.getElementById('display-name-top').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const displayRank = document.getElementById('display-rank');
            const exportCanvas = document.getElementById('export-canvas');
            
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.split(' ')[1]; 
            displayRank.innerText = rankText;
            
            exportCanvas.className = `theme-${rankSelect.value}`;
            
            // 更新左側面板的主題色，保持設計一致
            const root = document.documentElement;
            const controls = document.querySelector('.controls');
            if(rankSelect.value === 'gold'){
                controls.style.borderColor = '#d4af37';
            } else if(rankSelect.value === 'silver') {
                controls.style.borderColor = '#e2e8f0';
            } else {
                controls.style.borderColor = '#cd7f32';
            }
        }

        function checkConfigState(cIdx) {
            let activeCount = 0;
            for(let p = 1; p <= 6; p++) {
                let imgEl = document.getElementById(`part-c${cIdx}-p${p}`);
                let nameText = document.getElementById(`name-c${cIdx}-p${p}`).innerText.trim();
                let hasImg = !imgEl.src.includes('R0lGODlhAQABAIAAAAAAAP');
                if (hasImg || nameText !== '') activeCount++;
            }

            const grid = document.getElementById(`grid-c${cIdx}`);
            
            if(activeCount === 0) {
                grid.classList.remove('large-mode');
                for(let p = 1; p <= 6; p++) document.getElementById(`slot-c${cIdx}-p${p}`).style.display = 'flex';
            } else if(activeCount <= 3) {
                grid.classList.add('large-mode');
                for(let p = 1; p <= 6; p++){
                    let hasImg = !document.getElementById(`part-c${cIdx}-p${p}`).src.includes('R0lGODlhAQABAIAAAAAAAP');
                    let hasText = document.getElementById(`name-c${cIdx}-p${p}`).innerText.trim() !== '';
                    document.getElementById(`slot-c${cIdx}-p${p}`).style.display = (hasImg || hasText) ? 'flex' : 'none';
                }
            } else {
                grid.classList.remove('large-mode');
                for(let p = 1; p <= 6; p++){
                    let hasImg = !document.getElementById(`part-c${cIdx}-p${p}`).src.includes('R0lGODlhAQABAIAAAAAAAP');
                    let hasText = document.getElementById(`name-c${cIdx}-p${p}`).innerText.trim() !== '';
                    document.getElementById(`slot-c${cIdx}-p${p}`).style.display = (hasImg || hasText) ? 'flex' : 'none';
                }
            }
        }

        function updatePartName(cIdx, pIdx, value) { document.getElementById(`name-c${cIdx}-p${pIdx}`).innerText = value; checkConfigState(cIdx); }
        function previewPart(event, cIdx, pIdx) {
            const output = document.getElementById(`part-c${cIdx}-p${pIdx}`); const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = function() { output.src = reader.result; checkConfigState(cIdx); }
            reader.readAsDataURL(file);
        }

        function compressImage(file, maxWidth, maxHeight) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = function () {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(new File([blob], file.name, { type: 'image/png' })); }, 'image/png');
                    };
                };
            });
        }

        async function previewImageAutoBg(event, targetId, isPlayer = false) {
            const loadingOverlay = document.getElementById('loading-overlay'); const output = document.getElementById(targetId);
            let file = event.target.files[0]; if (!file) return;
            loadingOverlay.style.display = 'flex';
            try {
                if (isPlayer && file.size > 1024 * 1024) file = await compressImage(file, 800, 800);
                const imageBlob = await imglyRemoveBackground(file); const url = URL.createObjectURL(imageBlob);
                output.src = url; output.style.display = 'block';
            } catch (error) {
                console.error("去背失敗，載入原圖:", error);
                const reader = new FileReader(); reader.onload = () => { output.src = reader.result; output.style.display = 'block'; };
                reader.readAsDataURL(file);
            } finally { loadingOverlay.style.display = 'none'; }
        }

        function downloadImage() {
            const exportCanvas = document.getElementById('export-canvas'); const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank'); let rankText = rankSelect.options[rankSelect.selectedIndex].text.split(' ')[1]; 
            const fileName = `棚拍寫實_${rankText}_${nameSelect.value}.png`;

            window.scrollTo(0,0);

            html2canvas(exportCanvas, { scale: 2, useCORS: true, backgroundColor: '#000000' }).then(canvas => {
                const link = document.createElement('a'); link.download = fileName; link.href = canvas.toDataURL('image/png', 1.0); link.click();
            });
        }
        
        updateRank();
    </script>
</body>
</html>
