<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超炫砲 電競榮耀配置圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/@imgly/background-removal.js"></script>

    <style>
        :root {
            /* 基礎黑底 */
            --bg-dark: #050505;
            --panel-bg: #090a0f; 
            
            /* 預設霓虹變數 (會隨名次自動切換) */
            --neon-primary: #ffea00;
            --neon-glow: rgba(255, 234, 0, 0.6);
            --neon-grid: rgba(255, 234, 0, 0.15);
            --text-color-main: #ffffff;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
            height: 100vh;
            box-sizing: border-box;
        }

        /* 💻 左側控制面板 (科技風) */
        .controls {
            flex: 1; background: var(--bg-dark); padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 15px; max-width: 350px; overflow-y: auto; 
            border: 2px solid var(--neon-primary); 
            box-shadow: 0 0 15px var(--neon-glow), inset 0 0 10px var(--neon-glow);
            transition: all 0.5s ease;
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--text-color-main); text-shadow: 0 0 10px var(--neon-primary); border-bottom: 1px solid #333; padding-bottom: 10px;}
        .controls label { font-weight: bold; font-size: 14px; color: #ccc; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #111; border: 1px solid var(--neon-primary); color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; outline: none;}
        .controls input[type="text"]:focus { box-shadow: 0 0 10px var(--neon-glow); }
        
        .file-upload-wrapper { border: 1px solid #333; border-radius: 8px; padding: 15px; background: #0a0a0a; margin-bottom: 10px; border-left: 4px solid var(--neon-primary);}
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; text-shadow: 0 0 5px var(--neon-primary); font-size: 16px; border-bottom: 1px dashed #444; padding-bottom: 5px;}
        
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #000; padding: 10px; border-radius: 6px; border: 1px dashed #444; display: flex; flex-direction: column; gap: 6px;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 0; color: #888; font-weight: bold;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; color: #aaa;}
        .parts-grid-inputs input[type="text"] { width: 100%; font-size: 12px; padding: 6px; background: #111; border: 1px solid #333; margin:0; border-radius: 4px; color: #fff;}

        button { background: transparent; color: #fff; border: 2px solid var(--neon-primary); padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 0 15px var(--neon-glow) inset; transition: 0.3s;}
        button:hover { background: var(--neon-primary); color: #000; box-shadow: 0 0 25px var(--neon-glow); }

        /* 💻 右側預覽畫布 */
        .preview-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding-bottom: 50px;}
        #export-canvas { display: flex; gap: 20px; background-color: #000; padding: 20px; transition: all 0.5s ease; width: 1100px; height: 1350px;}

        /* 🎨 賽博龐克全息面板 */
        .cyber-panel {
            background-color: var(--panel-bg);
            position: relative;
            border: 3px solid var(--neon-primary);
            border-radius: 15px;
            box-shadow: 0 0 30px var(--neon-glow), inset 0 0 20px var(--neon-glow);
            overflow: hidden; transition: all 0.5s ease;
            height: 100%;
        }

        /* 網格背景 */
        .cyber-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--neon-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-grid) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0; pointer-events: none;
        }

        /* 掃描線特效 */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.03) 1px, transparent 2px);
            z-index: 1; pointer-events: none;
        }

        /* ⭕ HUD 科技光環 */
        .cyber-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; pointer-events: none; }
        .hud-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--neon-primary);
            box-shadow: 0 0 20px var(--neon-glow), inset 0 0 15px var(--neon-glow);
            opacity: 0.3;
        }
        .ring-1 { width: 700px; height: 700px; top: 5%; right: -250px; border: 4px dashed var(--neon-primary); }
        .ring-2 { width: 450px; height: 450px; bottom: -100px; left: -150px; border: 2px dotted var(--neon-primary); }
        .ring-3 { width: 200px; height: 200px; top: 40%; left: 10%; opacity: 0.15; border-width: 1px;}

        /* ✨ 霓虹發光文字 */
        .glow-text {
            color: var(--text-color-main);
            text-shadow: 0 0 10px var(--neon-primary), 0 0 20px var(--neon-primary), 0 0 30px var(--neon-glow);
            font-weight: 900;
        }

        /* 🖼️ 左半部：人物海報區 */
        .poster-section { width: 500px; padding: 30px 20px; box-sizing: border-box; }
        .content-wrapper { position: relative; z-index: 5; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center;}
        
        .top-name { 
            position: relative; z-index: 10;
            font-size: 38px; letter-spacing: 6px; 
            border-bottom: 3px solid var(--neon-primary); padding-bottom: 10px; width: 85%; text-align: center; 
            box-shadow: 0 10px 10px -10px var(--neon-glow); 
        }

        .player-img-container { 
            position: absolute; top: 80px; bottom: 350px; left: 0; width: 100%; 
            display: flex; justify-content: center; align-items: center; z-index: 2; 
        }
        .player-img-container img { 
            max-width: 150%; max-height: 100%; object-fit: contain; object-position: center;
            filter: drop-shadow(0 0 20px rgba(0,0,0,1)) drop-shadow(0 0 30px var(--neon-glow)); 
        }

        .bottom-gradient-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 450px;
            background: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
            z-index: 3; pointer-events: none;
        }

        .bottom-info-box {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        .rank-title-box { text-align: center; margin-bottom: 25px; }
        .rank-title-box h3 { font-size: 24px; color: #fff; margin: 0 0 5px 0; letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-primary); }
        .rank-title-box h1 { font-size: 75px; margin: 0; letter-spacing: 15px; }

        .logo-slot { width: 100%; height: 140px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px;}
        .logo-slot img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 0 15px var(--neon-glow)); }

        /* ⚙️ 右半部：零件配置陳列區 */
        .parts-section { width: 560px; padding: 30px 20px 50px 20px; box-sizing: border-box; display: flex; flex-direction: column;} 
        .parts-title { font-size: 34px; letter-spacing: 5px; margin-bottom: 15px; text-align: center;}

        #showcase-box {
            flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; width: 100%;
        }

        .config-block { 
            width: 95%; display: flex; flex-direction: column; align-items: center; 
            background: rgba(0,0,0,0.6); padding: 15px 0; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        } 
        .config-header { font-size: 22px; margin-bottom: 15px; letter-spacing: 4px; position: relative; }

        .parts-grid-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; transition: all 0.3s ease; }

        .part-item { width: 90px; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .part-item img { width: 100%; height: 90px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); transition: all 0.3s ease; }
        .part-name-text { font-size: 15px; font-weight: bold; color: #fff; text-align: center; width: 100%; word-break: break-all; text-shadow: 0 2px 4px #000; }

        /* 智能放大模式 */
        .parts-grid-display.large-mode { gap: 25px; }
        .parts-grid-display.large-mode .part-item { width: 125px; }
        .parts-grid-display.large-mode .part-item img { height: 125px; filter: drop-shadow(0 0 15px var(--neon-glow)); }
        .parts-grid-display.large-mode .part-name-text { font-size: 18px; letter-spacing: 1px; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 100; color: var(--neon-primary); font-size: 24px; font-weight: bold; text-shadow: 0 0 10px var(--neon-glow);}

        /* 🏆 動態電競色彩設定 */
        #export-canvas.theme-gold {
            --panel-bg: #0a0a00; --neon-primary: #ffea00; --neon-glow: rgba(255, 234, 0, 0.6); --neon-grid: rgba(255, 234, 0, 0.15);
        }
        #export-canvas.theme-silver {
            --panel-bg: #000a12; --neon-primary: #00f0ff; --neon-glow: rgba(0, 240, 255, 0.6); --neon-grid: rgba(0, 240, 255, 0.15);
        }
        #export-canvas.theme-bronze {
            --panel-bg: #120005; --neon-primary: #ff0055; --neon-glow: rgba(255, 0, 85, 0.6); --neon-grid: rgba(255, 0, 85, 0.15);
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-overlay">高階 AI 系統去背中...</div>

    <div class="controls">
        <h2>賽事配置主機</h2>
        <label>選手姓名:</label>
        <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')">
        
        <label>名次配置 (自動切換電競色系):</label>
        <select id="input-rank" onchange="updateRank()">
            <option value="gold">🏆 冠軍 (Neon Gold)</option>
            <option value="silver">🥈 亞軍 (Cyber Cyan)</option>
            <option value="bronze">🥉 季軍 (Blood Red)</option>
        </select>

        <div class="file-upload-wrapper">
            <h4>👤 選手人像照片</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'player-img', true)">
        </div>

        <div class="file-upload-wrapper">
            <h4>✨ 專屬賽事 LOGO</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'custom-logo-img')">
        </div>

        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 匯出超炫砲海報</button>
    </div>

    <div class="preview-container">
        <div id="export-canvas" class="theme-gold">
            
            <div class="cyber-panel poster-section" id="poster-panel">
                <div class="cyber-grid"></div>
                <div class="scanlines"></div>
                <div class="cyber-hud"><div class="hud-ring ring-1"></div><div class="hud-ring ring-2"></div></div>
                
                <div class="content-wrapper">
                    <div class="top-name glow-text" id="display-name-top">郭嘉弘</div>
                    
                    <div class="player-img-container">
                        <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                    </div>

                    <div class="bottom-gradient-overlay"></div>

                    <div class="bottom-info-box">
                        <div class="rank-title-box">
                            <h3>賽事最高榮耀</h3>
                            <h1 class="glow-text" id="display-rank">冠軍</h1>
                        </div>
                        <div class="logo-slot">
                            <img id="custom-logo-img" src="" alt="" style="display: none;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="cyber-panel parts-section">
                <div class="cyber-grid"></div>
                <div class="scanlines"></div>
                <div class="cyber-hud"><div class="hud-ring ring-1" style="top: 50%; right: -300px;"></div><div class="hud-ring ring-3"></div></div>

                <div class="content-wrapper" style="width: 100%;">
                    <div class="parts-title glow-text">陀螺配置</div>
                    <div id="showcase-box">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 戰術配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>部件 1</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 1)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 1, this.value)"></div>
                        <div><label>部件 2</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 2)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 2, this.value)"></div>
                        <div><label>部件 3</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 3)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 3, this.value)"></div>
                        <div><label>部件 4</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 4)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 4, this.value)"></div>
                        <div><label>部件 5</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 5)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 5, this.value)"></div>
                        <div><label>部件 6</label><input type="file" accept="image/*" onchange="previewPart(event, ${i}, 6)"><input type="text" placeholder="代號" oninput="updatePartName(${i}, 6, this.value)"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                const showcaseHtml = `
                <div class="config-block">
                    <div class="config-header glow-text" id="header-c${i}">配置 ${i}</div>
                    <div class="parts-grid-display" id="grid-c${i}">
                        <div class="part-item" id="slot-c${i}-p1"><img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p1"></div></div>
                        <div class="part-item" id="slot-c${i}-p2"><img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p2"></div></div>
                        <div class="part-item" id="slot-c${i}-p3"><img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p3"></div></div>
                        <div class="part-item" id="slot-c${i}-p4"><img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p4"></div></div>
                        <div class="part-item" id="slot-c${i}-p5"><img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p5"></div></div>
                        <div class="part-item" id="slot-c${i}-p6"><img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""><div class="part-name-text" id="name-c${i}-p6"></div></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        initConfigurations();

        function updateText(type) {
            if(type === 'name') document.getElementById('display-name-top').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const displayRank = document.getElementById('display-rank');
            const exportCanvas = document.getElementById('export-canvas');
            
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.split(' ')[1]; 
            displayRank.innerText = rankText;
            
            exportCanvas.className = `theme-${rankSelect.value}`;
        }

        function checkConfigState(cIdx) {
            let activeCount = 0;
            for(let p = 1; p <= 6; p++) {
                let imgEl = document.getElementById(`part-c${cIdx}-p${p}`);
                let nameText = document.getElementById(`name-c${cIdx}-p${p}`).innerText.trim();
                let hasImg = !imgEl.src.includes('R0lGODlhAQABAIAAAAAAAP');
                if (hasImg || nameText !== '') activeCount++;
            }

            const grid = document.getElementById(`grid-c${cIdx}`);
            
            if(activeCount === 0) {
                grid.classList.remove('large-mode');
                for(let p = 1; p <= 6; p++) document.getElementById(`slot-c${cIdx}-p${p}`).style.display = 'flex';
            } else if(activeCount <= 3) {
                grid.classList.add('large-mode');
                for(let p = 1; p <= 6; p++){
                    let hasImg = !document.getElementById(`part-c${cIdx}-p${p}`).src.includes('R0lGODlhAQABAIAAAAAAAP');
                    let hasText = document.getElementById(`name-c${cIdx}-p${p}`).innerText.trim() !== '';
                    document.getElementById(`slot-c${cIdx}-p${p}`).style.display = (hasImg || hasText) ? 'flex' : 'none';
                }
            } else {
                grid.classList.remove('large-mode');
                for(let p = 1; p <= 6; p++){
                    let hasImg = !document.getElementById(`part-c${cIdx}-p${p}`).src.includes('R0lGODlhAQABAIAAAAAAAP');
                    let hasText = document.getElementById(`name-c${cIdx}-p${p}`).innerText.trim() !== '';
                    document.getElementById(`slot-c${cIdx}-p${p}`).style.display = (hasImg || hasText) ? 'flex' : 'none';
                }
            }
        }

        function updatePartName(cIdx, pIdx, value) { document.getElementById(`name-c${cIdx}-p${pIdx}`).innerText = value; checkConfigState(cIdx); }
        function previewPart(event, cIdx, pIdx) {
            const output = document.getElementById(`part-c${cIdx}-p${pIdx}`); const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = function() { output.src = reader.result; checkConfigState(cIdx); }
            reader.readAsDataURL(file);
        }

        function compressImage(file, maxWidth, maxHeight) {
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = function () {
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => { resolve(new File([blob], file.name, { type: 'image/png' })); }, 'image/png');
                    };
                };
            });
        }

        async function previewImageAutoBg(event, targetId, isPlayer = false) {
            const loadingOverlay = document.getElementById('loading-overlay'); const output = document.getElementById(targetId);
            let file = event.target.files[0]; if (!file) return;
            loadingOverlay.style.display = 'flex';
            try {
                if (isPlayer && file.size > 1024 * 1024) file = await compressImage(file, 800, 800);
                const imageBlob = await imglyRemoveBackground(file); const url = URL.createObjectURL(imageBlob);
                output.src = url; output.style.display = 'block';
            } catch (error) {
                console.error("去背失敗，載入原圖:", error);
                const reader = new FileReader(); reader.onload = () => { output.src = reader.result; output.style.display = 'block'; };
                reader.readAsDataURL(file);
            } finally { loadingOverlay.style.display = 'none'; }
        }

        function downloadImage() {
            const exportCanvas = document.getElementById('export-canvas'); const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank'); let rankText = rankSelect.options[rankSelect.selectedIndex].text.split(' ')[1]; 
            const fileName = `電競賽事_${rankText}_${nameSelect.value}.png`;

            window.scrollTo(0,0);

            html2canvas(exportCanvas, { scale: 2, useCORS: true, backgroundColor: '#000000' }).then(canvas => {
                const link = document.createElement('a'); link.download = fileName; link.href = canvas.toDataURL('image/png', 1.0); link.click();
            });
        }
        
        updateRank();
    </script>
</body>
</html>
